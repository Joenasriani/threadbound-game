<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Threadbound - Recall Prototype</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 35%, #263445 0%, #10141c 55%, #07090d 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f6ead4;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #game { position: fixed; inset: 0; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 10;
    }
    .panel {
      pointer-events: auto;
      background: rgba(12, 16, 24, 0.68);
      border: 1px solid rgba(246, 234, 212, 0.24);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.26), inset 0 0 18px rgba(98, 202, 255, 0.06);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: clamp(10px, 2vw, 16px);
    }
    .title {
      font-size: clamp(14px, 2vw, 19px);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sub {
      font-size: clamp(11px, 1.6vw, 13px);
      opacity: 0.78;
      max-width: 540px;
      line-height: 1.35;
    }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    button {
      border: 1px solid rgba(246, 234, 212, 0.25);
      background: rgba(246, 234, 212, 0.09);
      color: #f6ead4;
      padding: clamp(8px, 1.8vw, 11px) clamp(10px, 2.1vw, 14px);
      border-radius: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    button:active { transform: translateY(1px) scale(0.98); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .worldRecall {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 14;
      display: none;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      font-size: clamp(10px, 1.55vw, 13px);
      padding: clamp(7px, 1.35vw, 10px) clamp(10px, 2vw, 15px);
      border-radius: 999px;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, rgba(79, 210, 255, 0.34), rgba(246, 234, 212, 0.16));
      border-color: rgba(98, 216, 255, 0.72);
      box-shadow: 0 0 28px rgba(86, 217, 255, 0.28), inset 0 0 18px rgba(86, 217, 255, 0.12);
      text-shadow: 0 1px 8px rgba(86, 217, 255, 0.35);
      white-space: nowrap;
    }
    .worldRecall.ready { display: block; animation: callPulse 1.15s ease-in-out infinite; }
    @keyframes callPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 24px rgba(86, 217, 255, 0.22), inset 0 0 18px rgba(86, 217, 255, 0.08); }
      50% { transform: translate(-50%, -50%) scale(1.045); box-shadow: 0 0 38px rgba(86, 217, 255, 0.42), inset 0 0 22px rgba(86, 217, 255, 0.16); }
    }
    .touch {
      position: fixed;
      left: max(14px, env(safe-area-inset-left));
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 12;
      pointer-events: none;
    }
    .cluster { display: flex; gap: 12px; pointer-events: auto; }
    .touchBtn {
      width: clamp(56px, 13vw, 82px);
      height: clamp(56px, 13vw, 82px);
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: clamp(20px, 5vw, 32px);
      background: rgba(246, 234, 212, 0.12);
      border: 1px solid rgba(246, 234, 212, 0.24);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
    @media (hover: none), (pointer: coarse) {
      .touch { display: flex; }
      .sub { display: none; }
    }
    @media (max-height: 480px) and (orientation: landscape) {
      .panel { padding: 8px 10px; border-radius: 14px; }
      .title { font-size: 12px; margin: 0; }
      .controls button { padding: 7px 9px; font-size: 11px; }
      .worldRecall { font-size: 9px; padding: 6px 10px; }
      .touchBtn { width: 52px; height: 52px; font-size: 20px; }
    }
    .notice {
      position: fixed;
      left: 50%;
      bottom: 22%;
      transform: translateX(-50%);
      background: rgba(10, 14, 20, 0.78);
      border: 1px solid rgba(246, 234, 212, 0.24);
      border-radius: 16px;
      padding: 12px 16px;
      opacity: 0;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 15;
      font-weight: 800;
      pointer-events: none;
      text-align: center;
      max-width: min(620px, calc(100vw - 40px));
    }
    .notice.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }
    .levelCompleteOverlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.28s ease;
      background: radial-gradient(circle at 50% 45%, rgba(86, 217, 255, 0.13), rgba(6, 9, 14, 0.54) 58%, rgba(6, 9, 14, 0.72));
      backdrop-filter: blur(4px);
    }
    .levelCompleteOverlay.show { opacity: 1; }
    .levelCompleteCard {
      min-width: min(420px, calc(100vw - 40px));
      max-width: min(560px, calc(100vw - 40px));
      padding: clamp(22px, 5vw, 42px);
      border-radius: 28px;
      text-align: center;
      background: rgba(12, 16, 24, 0.82);
      border: 1px solid rgba(246, 234, 212, 0.28);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42), 0 0 42px rgba(86, 217, 255, 0.14), inset 0 0 28px rgba(86, 217, 255, 0.08);
      transform: translateY(18px) scale(0.94);
      transition: transform 0.28s ease;
    }
    .levelCompleteOverlay.show .levelCompleteCard { transform: translateY(0) scale(1); }
    .levelCompleteKicker { font-size: clamp(11px, 2vw, 13px); letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; }
    .levelCompleteTitle { font-size: clamp(28px, 7vw, 54px); line-height: 1; font-weight: 900; letter-spacing: 0.04em; margin-bottom: 12px; text-shadow: 0 0 24px rgba(86, 217, 255, 0.35); }
    .levelCompleteSub { font-size: clamp(13px, 2.4vw, 17px); line-height: 1.4; opacity: 0.82; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div class="hud">
    <div class="panel">
      <div class="title" id="levelTitle">Threadbound</div>
      <div class="sub" id="levelHelp">Step on the trigger. Recall your past to hold it.</div>
    </div>
    <div class="panel controls"><button id="resetBtn">Restart Level</button></div>
  </div>
  <div class="touch">
    <div class="cluster"><div class="touchBtn" data-key="left">‹</div><div class="touchBtn" data-key="right">›</div></div>
    <div class="cluster"><div class="touchBtn" data-key="jump">⌃</div></div>
  </div>
  <button id="recallBtn" class="worldRecall" disabled>Recall</button>
  <div class="levelCompleteOverlay" id="levelCompleteOverlay">
    <div class="levelCompleteCard">
      <div class="levelCompleteKicker" id="levelCompleteKicker">Memory restored</div>
      <div class="levelCompleteTitle" id="levelCompleteTitle">Level Complete</div>
      <div class="levelCompleteSub" id="levelCompleteSub">Preparing the next memory...</div>
    </div>
  </div>
  <div class="notice" id="notice"></div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const gameEl = document.getElementById('game');
    const resetBtn = document.getElementById('resetBtn');
    const recallBtn = document.getElementById('recallBtn');
    const notice = document.getElementById('notice');
    const levelTitle = document.getElementById('levelTitle');
    const levelHelp = document.getElementById('levelHelp');
    const levelCompleteOverlay = document.getElementById('levelCompleteOverlay');
    const levelCompleteKicker = document.getElementById('levelCompleteKicker');
    const levelCompleteTitle = document.getElementById('levelCompleteTitle');
    const levelCompleteSub = document.getElementById('levelCompleteSub');

    const FIXED = 1 / 60;
    const MOVE = 5.2;
    const GRAVITY = -18.5;
    const JUMP = 10.6;
    const GHOST_APPEAR_DURATION = 1.05;
    const BODY_W = 0.55;
    const BODY_H = 1.45;

    const LEVEL_STATE = Object.freeze({ RECORDING: 'recording', GHOST_APPEARING: 'ghost_appearing', GHOST_REPLAYING: 'ghost_replaying', COMPLETE: 'complete', GAME_DONE: 'game_done' });
    const GAME_RULES = Object.freeze({ HOLD_FRAMES_AFTER_TRIGGER: 30, MIN_RECORDING_FRAMES: 12, OBSTACLE_BLOCK_MARGIN: 0.22, LEVEL_COMPLETE_DELAY_MS: 1800, MIN_TRIGGER_OBSTACLE_SEPARATION: 0.85 });

    const OBSTACLE_BANK = Object.freeze({
      blockers: [
        { id: 'retracting_iron_bars', name: 'Retracting Iron Bars', color: 0x3f4854, emissive: 0x101923, openColor: 0x7fdfff, openEmissive: 0x1fc8ff, linkColor: 0x7fdfff, safeState: 'Bars sink into the floor.' },
        { id: 'energy_lattice', name: 'Energy Lattice', color: 0x1f6f8f, emissive: 0x0ea9ff, openColor: 0x82e9ff, openEmissive: 0x2ed8ff, linkColor: 0x82e9ff, safeState: 'Energy grid fades out.' },
        { id: 'collapsing_brick_wall', name: 'Collapsing Brick Wall', color: 0x7b4c38, emissive: 0x32120a, openColor: 0xd49a6a, openEmissive: 0x62300d, linkColor: 0xd49a6a, safeState: 'Wall crumbles into passable rubble.' }
      ],
      pathCreators: [
        { id: 'phantom_bridge', name: 'Phantom Bridge', color: 0x836dff, emissive: 0x5b44ff, openColor: 0xb9f6ff, openEmissive: 0x65dfff, linkColor: 0xb9f6ff, safeState: 'Bridge solidifies into a walkway.' },
        { id: 'rising_pillar', name: 'Rising Pillar', color: 0x7e7968, emissive: 0x17140e, openColor: 0xc2b999, openEmissive: 0x3c3420, linkColor: 0xc2b999, safeState: 'Pillars rise into stepping stones.' }
      ],
      hazardDisablers: [
        { id: 'tesla_arc', name: 'Tesla Coil Arc', color: 0x4ed9ff, emissive: 0x0bc2ff, openColor: 0x2b4250, openEmissive: 0x071a24, linkColor: 0x4ed9ff, safeState: 'Electric arc dissipates.' },
        { id: 'flame_jets', name: 'Flame Jets', color: 0xff6a21, emissive: 0xff2a00, openColor: 0x3b4350, openEmissive: 0x0b1018, linkColor: 0xff9b38, safeState: 'Flames extinguish completely.' }
      ]
    });
    const OBSTACLE_PLACEMENT_BANK = Object.freeze([{id:'far_obstacle_from_trigger'}, {id:'dead_end_trigger_ledge'}, {id:'hazard_disable_corridor'}]);

    function safeArray(value) { return Array.isArray(value) ? value : []; }
    function playerYOnPlatform(platform) { return platform.y + platform.h / 2 + BODY_H / 2; }
    function triggerYOnPlatform(platform) { return platform.y + platform.h / 2 + 0.09; }

    const LEVELS = [
      {
        name: 'Level 1', title: 'Level 1 - First Trigger', help: 'Walk to the trigger. Stand on it, then press Recall so your ghost holds it.',
        meta: { tiers: 0, gaps: 0, triggers: 1, gameplayLength: 5.9 }, cameraClamp: { min: -2.8, max: 2.0 },
        platforms: [{ x: 0, y: -3.2, w: 8.5, h: 0.7 }], start: { x: -3.25, y: playerYOnPlatform({ y: -3.2, h: 0.7 }) },
        triggers: [{ x: -0.25, y: triggerYOnPlatform({ y: -3.2, h: 0.7 }), w: 0.82, h: 0.18 }],
        obstacles: [{ type: 'door', x: 1.15, y: -1.05, w: 0.62, h: 3.7, label: 'wall', pools: ['blockers'], placement: 'far_obstacle_from_trigger' }],
        links: [[0, 0]], portal: { x: 2.65, y: -2.52 }
      },
      {
        name: 'Level 2', title: 'Level 2 - One Tier, One Gap', help: 'Jump the gap, climb the tier, stand on the trigger, then press Recall.',
        meta: { tiers: 1, gaps: 1, triggers: 1, gameplayLength: 9.6 }, cameraClamp: { min: -5.5, max: 5.0 },
        platforms: [{ x: -3.75, y: -3.2, w: 3.3, h: 0.7 }, { x: 2.0, y: -3.2, w: 5.6, h: 0.7 }, { x: 0.55, y: -1.92, w: 1.7, h: 0.42, tier: true }],
        start: { x: -4.9, y: playerYOnPlatform({ y: -3.2, h: 0.7 }) }, triggers: [{ x: 0.55, y: triggerYOnPlatform({ y: -1.92, h: 0.42 }), w: 0.86, h: 0.18 }],
        obstacles: [{ type: 'door', x: 2.9, y: -0.35, w: 0.7, h: 5.1, label: 'tall tier wall', pools: ['blockers', 'pathCreators'], placement: 'dead_end_trigger_ledge' }],
        links: [[0, 0]], portal: { x: 4.65, y: -2.52 }
      }
    ];

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x10141c, 18, 46);
    const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 100);
    camera.position.set(0, 0, 18);
    camera.lookAt(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setClearColor(0x10141c, 1);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    gameEl.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xddeeff, 0x181018, 2.4));
    const key = new THREE.DirectionalLight(0xffffff, 2.1);
    key.position.set(5, 8, 8);
    scene.add(key);
    const bg = new THREE.Mesh(new THREE.PlaneGeometry(90, 44), new THREE.MeshBasicMaterial({ color: 0x151b26 }));
    bg.position.z = -8;
    scene.add(bg);
    const stars = new THREE.Group();
    for (let i = 0; i < 140; i += 1) {
      const dot = new THREE.Mesh(new THREE.CircleGeometry(Math.random() * 0.018 + 0.006, 8), new THREE.MeshBasicMaterial({ color: Math.random() > 0.72 ? 0x67d8ff : 0xf6ead4, transparent: true, opacity: Math.random() * 0.55 + 0.1 }));
      dot.position.set((Math.random() - 0.5) * 58, (Math.random() - 0.5) * 24, -6);
      stars.add(dot);
    }
    scene.add(stars);
    const world = new THREE.Group();
    scene.add(world);
    const platformMat = new THREE.MeshStandardMaterial({ color: 0x8a765f, roughness: 0.82, metalness: 0.05 });
    const tierMat = new THREE.MeshStandardMaterial({ color: 0x7f8b74, roughness: 0.82, metalness: 0.04 });
    const platformEdgeMat = new THREE.MeshStandardMaterial({ color: 0x3d3028, roughness: 0.9 });
    const switchMatOff = new THREE.MeshStandardMaterial({ color: 0x6b5a2a, emissive: 0x2d2100, emissiveIntensity: 0.4 });
    const switchMatOn = new THREE.MeshStandardMaterial({ color: 0xffd45a, emissive: 0xffb000, emissiveIntensity: 1.6 });

    const loader = new GLTFLoader();
    let actorTemplatePromise = null;
    function loadActorTemplate() {
      if (!actorTemplatePromise) actorTemplatePromise = new Promise((resolve, reject) => loader.load('./assets/threadbound_actor.glb', (gltf) => resolve(gltf.scene), undefined, reject));
      return actorTemplatePromise;
    }
    function tintGhost(root) {
      root.traverse((obj) => {
        if (!obj.isMesh || !obj.material) return;
        obj.material = obj.material.clone();
        obj.material.color.setHex(0x56d9ff);
        obj.material.emissive = new THREE.Color(0x0fa8ff);
        obj.material.emissiveIntensity = 1.4;
        obj.material.transparent = true;
        obj.material.opacity = 0.48;
        obj.material.depthWrite = false;
      });
    }
    function makeFallbackCharacter(isEcho) {
      const group = new THREE.Group();
      const skin = new THREE.MeshStandardMaterial({ color: isEcho ? 0x61dcff : 0xf4d5b7, transparent: isEcho, opacity: isEcho ? 0.44 : 1, emissive: isEcho ? 0x0fa8ff : 0x000000, emissiveIntensity: isEcho ? 1.2 : 0 });
      const cloth = new THREE.MeshStandardMaterial({ color: isEcho ? 0x43cfff : 0xb4314a, transparent: isEcho, opacity: isEcho ? 0.35 : 1, emissive: isEcho ? 0x0fa8ff : 0x050000, emissiveIntensity: isEcho ? 1.5 : 0.12 });
      const dark = new THREE.MeshStandardMaterial({ color: isEcho ? 0x41d7ff : 0x1e2430, transparent: isEcho, opacity: isEcho ? 0.38 : 1, emissive: isEcho ? 0x0fa8ff : 0x000000, emissiveIntensity: isEcho ? 1.2 : 0 });
      const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.28, 0.62, 6, 12), cloth); torso.position.y = 0.65; torso.scale.x = 0.86; group.add(torso);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.23, 18, 18), skin); head.position.y = 1.25; group.add(head);
      const armL = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.44, 5, 8), dark); armL.position.set(-0.33, 0.63, 0); group.add(armL);
      const armR = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.44, 5, 8), dark); armR.position.set(0.33, 0.63, 0); group.add(armR);
      const legL = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.45, 5, 8), dark); legL.position.set(-0.13, 0.13, 0); group.add(legL);
      const legR = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.45, 5, 8), dark); legR.position.set(0.13, 0.13, 0); group.add(legR);
      const scarf = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.09, 0.055), cloth); scarf.position.set(-0.24, 0.98, 0.08); group.add(scarf);
      group.userData.parts = { armL, armR, legL, legR, scarf };
      return group;
    }
    function makeCharacter({ echo = false } = {}) {
      const parent = new THREE.Group();
      const fallback = makeFallbackCharacter(echo);
      parent.add(fallback);
      parent.userData.parts = fallback.userData.parts;
      parent.userData.echo = echo;
      loadActorTemplate().then((template) => {
        const model = template.clone(true);
        model.traverse((obj) => { if (obj.isMesh && obj.material) obj.material = obj.material.clone(); });
        model.scale.setScalar(1.0);
        model.position.set(0, 0, 0);
        if (echo) tintGhost(model);
        parent.remove(fallback);
        parent.add(model);
        parent.userData.model = model;
        parent.userData.parts = {
          armL: model.getObjectByName('arm_l'), armR: model.getObjectByName('arm_r'),
          legL: model.getObjectByName('leg_l'), legR: model.getObjectByName('leg_r'), scarf: model.getObjectByName('scarf')
        };
      }).catch((err) => console.warn('Actor GLB failed to load. Procedural fallback is active.', err));
      return parent;
    }

    let currentLevelIndex = 0, currentLevel = LEVELS[0], platforms = [], triggerData = [], obstacleData = [], triggerMeshes = [], triggerAuras = [], linkMeshes = [], obstacleMeshes = [], portal = null, objectiveIndex = 0, doorOpenProgress = [], completedObjectives = [], memoryEchoes = [], levelAdvancePending = false;
    const player = { x: 0, y: 0, vx: 0, vy: 0, w: BODY_W, h: BODY_H, grounded: false, facing: 1 };
    let echo = null, echoMesh = null, echoRecordingStates = [], recording = [], recordingStates = [], recordingStart = null, levelState = LEVEL_STATE.RECORDING, echoBornAt = -999, echoFocusTimer = 0, triggerFlashTimer = 0, playerFrozenUntilEchoArrives = false, jumpLatch = false;
    const keys = { left: false, right: false, jump: false };
    const trails = [], burstRings = [], ghostMist = [];
    const playerMesh = makeCharacter();
    scene.add(playerMesh);

    function rects(a, b) { return Math.abs(a.x - b.x) * 2 < (a.w + b.w) && Math.abs(a.y - b.y) * 2 < (a.h + b.h); }
    function makeBodyAtCurrentStart() { return { x: currentLevel.start.x, y: currentLevel.start.y, vx: 0, vy: 0, w: BODY_W, h: BODY_H, grounded: false, facing: 1, frame: 0 }; }
    function cloneBodyFromPlayer() { return { x: player.x, y: player.y, vx: 0, vy: 0, w: BODY_W, h: BODY_H, grounded: player.grounded, facing: player.facing, frame: 0 }; }
    function captureBodyState(body) { return { x: body.x, y: body.y, vx: body.vx, vy: body.vy, grounded: body.grounded, facing: body.facing }; }
    function applyBodyState(body, state) { if (!body || !state) return; body.x = state.x; body.y = state.y; body.vx = state.vx || 0; body.vy = state.vy || 0; body.grounded = !!state.grounded; body.facing = state.facing || body.facing || 1; }
    function showNotice(text) { notice.textContent = text; notice.classList.add('show'); clearTimeout(showNotice.timeoutId); showNotice.timeoutId = setTimeout(() => notice.classList.remove('show'), 1400); }
    function hideLevelCompleteCard() { levelCompleteOverlay.classList.remove('show'); }
    function showLevelCompleteCard({ title, subtitle, kicker = 'Memory restored' }) { levelCompleteKicker.textContent = kicker; levelCompleteTitle.textContent = title; levelCompleteSub.textContent = subtitle; levelCompleteOverlay.classList.add('show'); }
    function safeRemoveObject(obj) { if (obj && obj.parent) obj.parent.remove(obj); }
    function clearGroup(group) { while (group.children.length) group.remove(group.children[0]); }
    function clearLevelTransientObjects() { safeRemoveObject(echoMesh); echoMesh = null; echo = null; memoryEchoes.forEach((item) => safeRemoveObject(item.mesh)); memoryEchoes = []; trails.forEach((item) => safeRemoveObject(item.mesh)); trails.length = 0; burstRings.forEach((item) => safeRemoveObject(item.mesh)); burstRings.length = 0; ghostMist.forEach((item) => safeRemoveObject(item.mesh)); ghostMist.length = 0; }

    function makePlatform(platform) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(platform.w, platform.h, 1.0), platform.tier ? tierMat : platformMat);
      mesh.position.set(platform.x, platform.y, 0); world.add(mesh);
      const edge = new THREE.Mesh(new THREE.BoxGeometry(platform.w + 0.08, 0.06, 1.04), platformEdgeMat);
      edge.position.set(platform.x, platform.y + platform.h / 2 + 0.045, 0.01); world.add(edge);
    }
    function getObstaclePoolEntries(pools) { const entries = []; safeArray(pools && pools.length ? pools : ['blockers']).forEach((poolName) => { const pool = OBSTACLE_BANK[poolName]; if (Array.isArray(pool)) entries.push(...pool); }); return entries.length ? entries : OBSTACLE_BANK.blockers.slice(); }

    }

    function beginAutoRecording(message) { echo = null; echoMesh = null; echoRecordingStates = []; recording = []; recordingStates = [captureBodyState(player)]; recordingStart = cloneBodyFromPlayer(); levelState = LEVEL_STATE.RECORDING; echoBornAt = -999; echoFocusTimer = 0; triggerFlashTimer = 0; playerFrozenUntilEchoArrives = false; showNotice(message || `Reach trigger ${objectiveIndex + 1}, then press Recall`); updateHud(); updateRecallButton(); }
